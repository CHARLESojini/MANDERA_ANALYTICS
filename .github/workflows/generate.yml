name: Mandera Analytics — Generate synthetic data

on:
  schedule:
    - cron: '0 7 * * *'    # 8:00 AM WAT daily (WAT = UTC+1)
    - cron: '0 15 * * *'   # 4:00 PM WAT daily
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (e.g. backfill, test)'
        required: false
        default: 'Manual run'
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  generate:
    name: Run data generator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data generator
        run: python -m Data_Generator.generator
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}

      - name: Confirm completion
        run: |
          echo "========================================"
          echo "  Data generation finished successfully"
          echo "  Run ID   : ${{ github.run_id }}"
          echo "  Actor    : ${{ github.actor }}"
          echo "========================================"